  h1,h2,h3,.display{
    font-family:'Montserrat',sans-serif; text-transform:uppercase; letter-spacing:.01em; font-weight:800;
  }
  #app{min-height:100%;}

  .hero{
    background:linear-gradient(135deg, var(--dark2), var(--dark)); padding:32px 48px; display:flex; align-items:center; justify-content:space-between; gap:24px;
    border-bottom:4px solid var(--acid);
  }
  .hero h1{font-size:30px; margin:0 0 6px; color:#fff; font-weight:800; line-height:1.1;}
  .hero .sub{font-size:14px; color:var(--muted); font-weight:400;}
  .hero .actions{display:flex; gap:10px; align-items:center;}
  .badge{
    background:var(--acid); color:var(--ink); font-weight:700;
    padding:10px 18px; border-radius:10px; font-size:13px; white-space:nowrap; text-transform:uppercase; letter-spacing:.03em;
  }
  .container{max-width:1260px; margin:0 auto; padding:28px 48px 60px;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; margin-bottom:18px;}
  label{font-size:11.5px; color:var(--muted); display:block; margin-bottom:6px; letter-spacing:.04em; text-transform:uppercase; font-weight:600;}
  .field{margin-bottom:16px;}
  input,select{
    font-family:'Montserrat',sans-serif; background:var(--panel2); color:var(--text);
    border:1px solid var(--border); border-radius:9px; padding:10px 12px; font-size:14px; width:100%;
  }
  input:focus, select:focus{outline:none; border-color:var(--acid);}
  button{
    font-family:'Montserrat',sans-serif; border:none; border-radius:9px; padding:11px 18px;
    font-size:13px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; cursor:pointer;
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
  }
  button.primary{background:var(--acid); color:var(--ink); border:none;}
  button.primary:hover{background:var(--acid);}
  button.acid{background:var(--acid); color:var(--ink); border:none;}
  button.acid:hover{background:#f8f281;}
  button.warn{background:var(--danger); color:#2a0906; border:none;}
  button.small{padding:7px 13px; font-size:11.5px;}
  button.ghost{background:transparent;}
  button:active{opacity:.8;}
  button:disabled{opacity:.4; cursor:not-allowed;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:end;}
  .grid4{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; align-items:end;}
  .player-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 14px;}
  .player-row{display:flex; gap:8px; align-items:center;}
  .player-row input{flex:1;}
  .rm{padding:9px 12px; background:var(--panel2); border-radius:9px; color:var(--danger); border:1px solid var(--border); font-size:14px; line-height:1;}
  .hint{font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.55;}
  .rec-box{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-top:10px; font-size:13px;}
  .rec-box b{color:var(--acid);}
  .setup-actions{display:flex; gap:12px; align-items:center; margin-top:6px;}

  .layout{display:grid; grid-template-columns:340px 1fr; gap:24px; align-items:start;}
  .section-title{font-size:12.5px; font-weight:700; color:var(--acid); margin-bottom:14px; letter-spacing:.05em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center;}
  .lb-row{display:flex; align-items:center; padding:10px 8px; border-radius:9px; gap:6px;}
  .lb-row:nth-child(odd){background:var(--panel2);}
  .lb-rank{width:20px; color:var(--muted); font-size:13px; font-weight:700;}
  .lb-name{flex:1; font-weight:600; font-size:13.5px;}
  .lb-stats{font-size:11.5px; color:var(--muted); text-align:right; min-width:78px;}
  .lb-points{font-weight:800; color:var(--acid); font-size:16px; margin-left:6px; min-width:34px; text-align:right;}

  .leaderboard-card{
    position:sticky; top:14px; max-height:calc(100vh - 28px);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .leaderboard-card #leaderboard{overflow-y:auto; flex:1; padding-right:4px; margin:0 -4px;}
  .leaderboard-card #leaderboard::-webkit-scrollbar{width:6px;}
  .leaderboard-card #leaderboard::-webkit-scrollbar-thumb{background:var(--border); border-radius:6px;}

  .round-block{margin-bottom:20px;}
  .round-title{font-size:12.5px; font-weight:700; color:var(--acid); margin-bottom:10px; text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:8px; justify-content:space-between;}
  .round-title .left{display:flex; align-items:center; gap:8px;}
  .played-badge{font-size:10px; background:var(--acid); color:var(--ink); padding:3px 8px; border-radius:6px; font-weight:700;}
  .del-round{background:transparent; border:1px solid var(--border); color:var(--danger); padding:4px 9px; font-size:10.5px; border-radius:6px;}
  .matches-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .match{border:1px solid var(--border); border-radius:11px; padding:12px 14px; background:var(--panel2);}
  .match .court{font-size:10.5px; color:var(--muted); margin-bottom:8px; font-weight:700; letter-spacing:.03em;}
  .teams{display:flex; align-items:center; gap:8px;}
  .team{flex:1; font-size:13px; font-weight:500; line-height:1.3;}
  .team.ko-winner{color:var(--acid); font-weight:800;}
  .score-input{width:52px; text-align:center; padding:8px 4px; font-weight:700; border-color:var(--border);}
  .score-input:focus{border-color:var(--acid);}
  .vs{color:var(--muted); font-size:12px;}
  .opp-score{display:inline-block; width:34px; text-align:center; font-weight:700; color:var(--muted);}
  .bench{font-size:11.5px; color:var(--muted); margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:24px 0;}
  .add-round-row{display:flex; justify-content:center; margin-top:6px; margin-bottom:24px;}

  .podium-wrap{margin-bottom:26px;}
  .podium-title{font-size:12.5px; font-weight:700; color:var(--acid); margin-bottom:16px; letter-spacing:.06em; text-transform:uppercase; text-align:center;}
  .podium{display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; align-items:end;}
  .podium-card{
    border-radius:16px; padding:22px 16px 20px; text-align:center; position:relative;
    border:1px solid rgba(255,255,255,.12);
  }
  .podium-card .medal{font-size:38px; line-height:1; margin-bottom:8px; display:block;}
  .podium-card .rank-label{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; opacity:.85; margin-bottom:6px;}
  .podium-card .name{font-size:16px; font-weight:800; text-transform:uppercase; letter-spacing:.01em; margin-bottom:6px; line-height:1.2;}
  .podium-card .pts{font-size:26px; font-weight:800; margin-bottom:2px;}
  .podium-card .meta{font-size:11.5px; opacity:.8; font-weight:500;}
  .podium-gold{
    background:linear-gradient(160deg,#e9c766,#a97f1f); color:#2b1c02;
    transform:translateY(-14px); box-shadow:0 10px 26px rgba(212,175,55,.28);
  }
  .podium-silver{
    background:linear-gradient(160deg,#dfe3e6,#9aa1a8); color:#1c2024;
    box-shadow:0 8px 20px rgba(180,190,198,.18);
  }
  .podium-bronze{
    background:linear-gradient(160deg,#d79a5e,#93552a); color:#2a1607;
    box-shadow:0 8px 20px rgba(150,90,40,.2);
  }
  .lb-row.top1{background:linear-gradient(90deg, rgba(233,199,102,.22), transparent); border-left:3px solid #d4af37;}
  .lb-row.top2{background:linear-gradient(90deg, rgba(223,227,230,.16), transparent); border-left:3px solid #b9c1c9;}
  .lb-row.top3{background:linear-gradient(90deg, rgba(215,154,94,.16), transparent); border-left:3px solid #b06a35;}
  .lb-name{cursor:pointer; border-bottom:1px dashed transparent;}
  .lb-name:hover{border-bottom-color:var(--muted);}
  .lb-name-input{width:auto; padding:4px 6px; font-size:13.5px; font-weight:600;}
  .lb-name-col{flex:1; min-width:0;}
  .lb-points-col{text-align:right;}
  .lb-sub{font-size:10.5px; color:var(--muted); margin-top:2px; white-space:nowrap;}
  .lb-sub .diff-pos{color:#8fd19e;}
  .lb-sub .diff-neg{color:var(--danger);}
  .lb-add-row{margin-top:10px; padding-top:10px; border-top:1px solid var(--border);}

  .ko-card{border:1px solid var(--acid-dark);}
  .ko-card .section-title{color:var(--acid);}

  /* ---------- RESPONSIVE: TABLET / LANDSCAPE PHONE ---------- */
  @media (max-width: 1000px){
    .container{padding:24px 24px 50px;}
    .hero{padding:24px 24px;}
    .layout{grid-template-columns: 280px 1fr;}
  }

  /* ---------- RESPONSIVE: PORTRAIT PHONE ---------- */
  @media (max-width: 680px){
    body{

    .hero{
      padding:18px 16px; flex-direction:column; align-items:flex-start; gap:14px;

    .hero h1{font-size:20px;}
    .hero .sub{font-size:12.5px;}
    .hero .actions{flex-wrap:wrap; gap:8px; width:100%;}
    .hero .actions button{flex:0 0 auto;}

    .leaderboard-card{position:sticky; top:8px; max-height:46vh;}
    .matches-grid{grid-template-columns:1fr;}
    .podium{grid-template-columns:1fr; gap:10px;}
    .podium-gold{transform:none;}
    button{padding:12px 16px; font-size:13px;}

  /* ---------- RESPONSIVE: LANDSCAPE PHONE (short height, wide enough for 2 columns) ---------- */
  /* Mirrors the desktop two-column layout as closely as possible: score entry stays
     on the left (wide), leaderboard moves to the right (narrow), and the action
     buttons relocate into a fixed bottom bar so the short viewport isn't eaten by
     header chrome. */
  @media (max-height: 500px) and (min-width: 620px){
    body{padding-bottom:0;}
    .hero{padding:10px 20px 10px;}
    .hero h1{font-size:18px; margin-bottom:2px;}
    .hero .sub{font-size:11px;}
    .badge{font-size:10px; padding:6px 12px;}
    .container{padding:14px 20px 78px;}
    .card{padding:14px 16px;}

    .layout{grid-template-columns: 1fr 260px; gap:16px;}
    #roundsCol{order:1;}
    .leaderboard-card{
      order:2; position:sticky; top:8px;
      max-height:calc(100vh - 100px);
    }
    .matches-grid{grid-template-columns:1fr 1fr;}

    /* Action buttons become a fixed bottom bar, freeing the header */
    .hero .actions{
      position:fixed; left:0; right:0; bottom:0; z-index:50;
      background:var(--dark2); border-top:2px solid var(--acid);
      padding:8px 12px calc(8px + env(safe-area-inset-bottom));
      display:flex; gap:6px; overflow-x:auto; flex-wrap:nowrap;
      justify-content:flex-start;
    }
    .hero .actions button{flex:0 0 auto; white-space:nowrap; padding:9px 13px; font-size:11.5px;}
    .hero .actions::-webkit-scrollbar{display:none;}

    input,select{font-size:16px;} /* avoid iOS auto-zoom */
  }

  /* Very narrow phones (SE, older models) */
  @media (max-width: 380px){
    .grid4{grid-template-columns:1fr 1fr;}
    .hero h1{font-size:18px;}
  }

</head>
<body>
<div id="app"></div>

<script>
const STORAGE_KEY = 'sterling_americano_state_v3';


function loadState(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

function todayLabel(){
  return new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
}

function defaultState(){
  return {
    stage: 'setup',
    tournamentName: 'World Cup Americano at STERLING',
    date: todayLabel(),
    players: ['', '', '', '', '', '', '', ''],
    pointsTarget: 21,
    numCourts: 2,
    numRounds: 8,
    sessionMinutes: 120,
    schedule: null,
    scores: null,
    knockout: null
  };
}

let state = loadState() || defaultState();
if(state.sessionMinutes === undefined) state.sessionMinutes = 120;
if(state.knockout === undefined) state.knockout = null;

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(state.stage === 'setup' ? renderSetup() : renderPlaying());
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- ROUND RECOMMENDATION ---------- */
function estimateMinutesPerRound(points, players, courts){
  const base = 10.9 * (points/16);
  const maxPlayable = courts*4;
  const benchRatio = players > maxPlayable ? (players - maxPlayable)/players : 0;
  const overhead = benchRatio * 1.6;
  return base + overhead;
}
function recommendRounds(points, players, courts, sessionMinutes){
  const perRound = estimateMinutesPerRound(points, players, courts);
  const rounds = Math.max(1, Math.round(sessionMinutes / perRound));
  return {rounds, perRound};
}

/* ---------- SETUP ---------- */
function renderSetup(){
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="hero">
      <div>
        <h1>${escapeHtml(state.tournamentName)}</h1>
        <div class="sub">${escapeHtml(state.date)} &nbsp;&middot;&nbsp; Sterling Sport &amp; Wellness</div>
      </div>
      <div class="actions">
        <button id="importBtnSetup" class="small ghost">Import tournament</button>
        <input type="file" id="importFileSetup" accept="application/json" style="display:none;" />
        <div class="badge">SET UP EVENT</div>
      </div>
    </div>
    <div class="container">

      <div class="card">
        <div class="field">
          <label>Tournament name</label>
          <div style="display:flex; gap:8px;">
            <input id="tName" type="text" value="${escapeHtml(state.tournamentName)}" style="flex:1;" />
            <button id="saveNameBtn" class="small">Save</button>
          </div>
        </div>
        <div class="hint">Date is set automatically: <b>${escapeHtml(state.date)}</b></div>
      </div>

      <div class="card">
        <div class="section-title"><span>PLAYERS (8&ndash;12 RECOMMENDED)</span></div>
        <div class="player-grid" id="playersList"></div>
        <div style="margin-top:12px;">
          <button id="addPlayer" class="small">+ Add player</button>
        </div>
      </div>

      <div class="card">
        <div class="grid4">
          <div class="field">
            <label>Points per match (8&ndash;32)</label>
            <input id="pointsTarget" type="number" min="8" max="32" step="1" />
          </div>
          <div class="field">
            <label>Courts</label>
            <input id="numCourts" type="number" min="1" max="6" />
          </div>
          <div class="field">
            <label>Rounds</label>
            <input id="numRounds" type="number" min="1" max="40" />
          </div>
          <div class="field">
            <label>Session length (min)</label>
            <input id="sessionMinutes" type="number" min="15" max="480" step="5" />
          </div>
        </div>
        <div class="hint">The scheduler guarantees every player partners with every other player at least once before any partnership repeats (when mathematically possible for the group size). Repeat opponents are a lower-priority factor it also tries to reduce. If the number of players isn't a multiple of 4 &times; courts, players sit out on a fair rotation.</div>
        <div class="rec-box" id="recBox"></div>
      </div>

      <div class="setup-actions">
        <button id="generateBtn" class="primary" style="padding:13px 26px; font-size:14px;">Generate rounds &amp; start</button>
      </div>
    </div>
  `;

  const importFileSetup = wrap.querySelector('#importFileSetup');
  wrap.querySelector('#importBtnSetup').addEventListener('click', ()=> importFileSetup.click());
  importFileSetup.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(file) importStateFromFile(file);
  });

  const list = wrap.querySelector('#playersList');
  function renderPlayers(){
    list.innerHTML = '';
    state.players.forEach((name,i)=>{
      const row = document.createElement('div');
      row.className = 'player-row';
      row.innerHTML = `
        <input type="text" placeholder="Player ${i+1}" value="${escapeHtml(name)}" data-idx="${i}" />
        <button class="rm" data-idx="${i}">&#10005;</button>
      `;
      list.appendChild(row);
    });
    list.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('input', e=>{
        state.players[+e.target.dataset.idx] = e.target.value;
        saveState();
        updateRec();
      });
    });
    list.querySelectorAll('.rm').forEach(btn=>{
      btn.addEventListener('click', e=>{
        state.players.splice(+e.target.dataset.idx,1);
        saveState();
        renderPlayers();
        updateRec();
      });
    });
  }
  renderPlayers();

  wrap.querySelector('#tName').addEventListener('input', e=>{ state.tournamentName = e.target.value; saveState(); });
  wrap.querySelector('#saveNameBtn').addEventListener('click', ()=>{
    const val = wrap.querySelector('#tName').value.trim();
    if(val) state.tournamentName = val;
    saveState();
    const btn = wrap.querySelector('#saveNameBtn');
    const original = btn.textContent;
    btn.textContent = 'Saved \u2713';
    btn.disabled = true;
    setTimeout(()=>{ btn.textContent = original; btn.disabled = false; }, 900);
    wrap.querySelector('.hero h1').textContent = state.tournamentName;
  });

  wrap.querySelector('#addPlayer').addEventListener('click', ()=>{
    if(state.players.length >= 24) return;
    state.players.push('');
    saveState();
    renderPlayers();
    updateRec();
  });

  const ptInp = wrap.querySelector('#pointsTarget');
  ptInp.value = state.pointsTarget;
  ptInp.addEventListener('input', e=>{
    let v = +e.target.value || 8;
    v = Math.max(8, Math.min(32, v));
    state.pointsTarget = v;
    saveState(); updateRec();
  });

  const courtsInp = wrap.querySelector('#numCourts');
  courtsInp.value = state.numCourts;
  courtsInp.addEventListener('input', e=>{ state.numCourts = Math.max(1, +e.target.value||1); saveState(); updateRec(); });

  const roundsInp = wrap.querySelector('#numRounds');
  roundsInp.value = state.numRounds;
  roundsInp.addEventListener('input', e=>{ state.numRounds = Math.max(1, +e.target.value||1); saveState(); });

  const sessionInp = wrap.querySelector('#sessionMinutes');
  sessionInp.value = state.sessionMinutes;
  sessionInp.addEventListener('input', e=>{ state.sessionMinutes = Math.max(15, +e.target.value||120); saveState(); updateRec(); });

  const recBox = wrap.querySelector('#recBox');
  function updateRec(){
    const playerCount = state.players.map(n=>n.trim()).filter(Boolean).length || 8;
    const {rounds, perRound} = recommendRounds(state.pointsTarget, playerCount, state.numCourts, state.sessionMinutes);
    recBox.innerHTML = `Recommended: <b>~${rounds} rounds</b> to fit a ${state.sessionMinutes}-minute session &mdash; estimated <b>${perRound.toFixed(1)} min/round</b> at ${state.pointsTarget} points with ${playerCount} players on ${state.numCourts} court(s). This is an approximation; adjust the Rounds field above as you like.`;
  }
  updateRec();

  wrap.querySelector('#generateBtn').addEventListener('click', ()=>{
    const names = state.players.map(n=>n.trim()).filter(n=>n.length>0);
    if(names.length < 4){ alert('You need at least 4 players.'); return; }
    state.players = names;
    const built = buildSchedule(names.length, state.numRounds, state.numCourts);
    state.schedule = built.schedule;
    state.scores = built.schedule.map(r => r.matches.map(()=>({a:null})));
    state.stage = 'playing';
    saveState();
    render();
  });

  return wrap;
}

/* ---------- SCHEDULING ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// Attempts to pair up every player in `players` with a partner they have NEVER
// partnered before (partnerCount===0). Uses randomised greedy retries, which
// reliably finds a valid perfect matching when one exists for this group size.
function findFreshPerfectMatching(players, partnerCount, trials){
  for(let t=0; t<trials; t++){
    const avail = shuffle(players.slice());
    const pairs = [];
    let failed = false;
    while(avail.length){
      const p = avail.shift();
      const candidates = avail.filter(c => partnerCount[p][c] === 0);
      if(candidates.length === 0){ failed = true; break; }
      const partner = shuffle(candidates)[0];
      pairs.push([p, partner]);
      avail.splice(avail.indexOf(partner), 1);
    }
    if(!failed) return pairs;
  }
  return null;
}

// Fallback once no zero-repeat matching exists: pairs everyone up while
// minimising how many times each partnership has already occurred.
function findLoosePerfectMatching(players, partnerCount, trials){
  let best = null, bestScore = Infinity;
  for(let t=0; t<trials; t++){
    const avail = shuffle(players.slice());
    const pairs = [];
    let totalScore = 0;
    while(avail.length){
      const p = avail.shift();
      const ranked = avail.slice().sort((a,b)=> partnerCount[p][a]-partnerCount[p][b] || (Math.random()-0.5));
      const partner = ranked[0];
      totalScore += partnerCount[p][partner];
      pairs.push([p, partner]);
      avail.splice(avail.indexOf(partner), 1);
    }
    if(totalScore < bestScore){ bestScore = totalScore; best = pairs; }
  }
  return best;
}

// Given the round's teams (pairs), groups them into courts of 2 teams each,
// minimising repeated opponents.
function pairUpCourts(pairs, opponentCount, trials){
  let best = null, bestScore = Infinity;
  for(let t=0; t<trials; t++){
    const shuffled = shuffle(pairs);
    let totalScore = 0;
    const courts = [];
    for(let i=0;i<shuffled.length;i+=2){
      const teamA = shuffled[i], teamB = shuffled[i+1];
      const [a1,a2]=teamA, [b1,b2]=teamB;
      const score = opponentCount[a1][b1]+opponentCount[a1][b2]+opponentCount[a2][b1]+opponentCount[a2][b2];
      totalScore += score;
      courts.push({teamA, teamB});
    }
    if(totalScore < bestScore){ bestScore = totalScore; best = courts; }
  }
  return best;
}

function generateSingleRound(n, numCourts, benchCount, partnerCount, opponentCount){
  const maxPlayable = numCourts*4;
  let slots = Math.min(n, maxPlayable);
  slots = slots - (slots % 4);
  const benchNeeded = n - slots;

  const order = shuffle([...Array(n).keys()]).sort((a,b)=> benchCount[a]-benchCount[b]);
  const benched = order.slice(0, benchNeeded);
  const benchedSet = new Set(benched);
  benched.forEach(p=> benchCount[p]++);

  const playing = [...Array(n).keys()].filter(p=>!benchedSet.has(p));

  let pairs = findFreshPerfectMatching(playing, partnerCount, 6000);
  if(!pairs){
    pairs = findLoosePerfectMatching(playing, partnerCount, 3000);
  }

  const courts = pairUpCourts(pairs, opponentCount, 600);

  const roundMatches = courts.map((c,idx)=>{
    const [a1,a2]=c.teamA, [b1,b2]=c.teamB;
    partnerCount[a1][a2]++; partnerCount[a2][a1]++;
    partnerCount[b1][b2]++; partnerCount[b2][b1]++;
    opponentCount[a1][b1]++; opponentCount[b1][a1]++;
    opponentCount[a1][b2]++; opponentCount[b2][a1]++;
    opponentCount[a2][b1]++; opponentCount[b1][a2]++;
    opponentCount[a2][b2]++; opponentCount[b2][a2]++;
    return {court: idx+1, teamA:c.teamA, teamB:c.teamB};
  });

  return {matches: roundMatches, bench: benched};
}

function buildSchedule(n, numRounds, numCourts){
  const benchCount = Array(n).fill(0);
  const partnerCount = Array.from({length:n}, ()=>Array(n).fill(0));
  const opponentCount = Array.from({length:n}, ()=>Array(n).fill(0));
  const schedule = [];
  for(let r=0;r<numRounds;r++){
    schedule.push(generateSingleRound(n, numCourts, benchCount, partnerCount, opponentCount));
  }
  return {schedule};
}

// Replays existing schedule to rebuild count matrices, used when adding a round later
function replayCounts(n, numCourts, schedule){
  const benchCount = Array(n).fill(0);
  const partnerCount = Array.from({length:n}, ()=>Array(n).fill(0));
  const opponentCount = Array.from({length:n}, ()=>Array(n).fill(0));
  schedule.forEach(round=>{
    round.bench.forEach(p=> benchCount[p]++);
    round.matches.forEach(m=>{
      const [a1,a2]=m.teamA, [b1,b2]=m.teamB;
      partnerCount[a1][a2]++; partnerCount[a2][a1]++;
      partnerCount[b1][b2]++; partnerCount[b2][b1]++;
      opponentCount[a1][b1]++; opponentCount[b1][a1]++;
      opponentCount[a1][b2]++; opponentCount[b2][a1]++;
      opponentCount[a2][b1]++; opponentCount[b1][a2]++;
      opponentCount[a2][b2]++; opponentCount[b2][a2]++;
    });
  });
  return {benchCount, partnerCount, opponentCount};
}

/* ---------- KNOCKOUT STAGE ---------- */
function findKoMatch(id){
  if(!state.knockout) return null;
  for(const round of state.knockout.rounds){
    const m = round.matches.find(mm=>mm.id===id);
    if(m) return m;
  }
  return null;
}

// Returns the 2-player team ([idxA, idxB]) for a ref, or null if not yet decided.
function resolveTeamRef(ref){
  if(!ref) return null;
  if(ref.type === 'seed') return state.knockout.seeds[ref.n];
  if(ref.type === 'winner'){
    const m = findKoMatch(ref.id);
    if(!m || m.score.a === null || m.score.a === '') return null;
    const target = state.pointsTarget;
    const a = +m.score.a, b = target - a;
    if(a === b) return null;
    return resolveTeamRef(a > b ? m.a : m.b);
  }
  return null;
}
function resolveLoserTeam(matchId){
  const m = findKoMatch(matchId);
  if(!m || m.score.a === null || m.score.a === '') return null;
  const target = state.pointsTarget;
  const a = +m.score.a, b = target - a;
  if(a === b) return null;
  return resolveTeamRef(a > b ? m.b : m.a);
}

// Pairs individual leaderboard ranks into 2-player teams for the bracket,
// using snake seeding (rank1+rankLast, rank2+rankSecondLast, ...) so each
// team combines a stronger and weaker finisher for balance.
function buildKoTeams(lb, teamCount){
  const teams = [];
  for(let k=0; k<teamCount; k++){
    teams.push([lb[k].idx, lb[teamCount*2 - 1 - k].idx]);
  }
  return teams;
}

function generateKnockout(stage){
  const lb = computeLeaderboard().filter(p=>p.played>0);
  let seeds, rounds;
  if(stage === 'quarterfinal'){
    if(lb.length < 16){ alert('You need at least 16 players with recorded results to form 8 two-player teams for the Quarterfinal stage.'); return; }
    seeds = buildKoTeams(lb, 8);
    rounds = [
      {name:'Quarterfinal', matches:[
        {id:'QF1', a:{type:'seed',n:0}, b:{type:'seed',n:2}, score:{a:null}},
        {id:'QF2', a:{type:'seed',n:1}, b:{type:'seed',n:3}, score:{a:null}},
        {id:'QF3', a:{type:'seed',n:4}, b:{type:'seed',n:6}, score:{a:null}},
        {id:'QF4', a:{type:'seed',n:5}, b:{type:'seed',n:7}, score:{a:null}}
      ]},
      {name:'Semifinal', matches:[
        {id:'SF1', a:{type:'winner',id:'QF1'}, b:{type:'winner',id:'QF2'}, score:{a:null}},
        {id:'SF2', a:{type:'winner',id:'QF3'}, b:{type:'winner',id:'QF4'}, score:{a:null}}
      ]},
      {name:'Final', matches:[
        {id:'F1', a:{type:'winner',id:'SF1'}, b:{type:'winner',id:'SF2'}, score:{a:null}}
      ]}
    ];
  } else if(stage === 'semifinal'){
    if(lb.length < 8){ alert('You need at least 8 players with recorded results to form 4 two-player teams for the Semifinal stage.'); return; }
    seeds = buildKoTeams(lb, 4);
    rounds = [
      {name:'Semifinal', matches:[
        {id:'SF1', a:{type:'seed',n:0}, b:{type:'seed',n:3}, score:{a:null}},
        {id:'SF2', a:{type:'seed',n:1}, b:{type:'seed',n:2}, score:{a:null}}
      ]},
      {name:'Final', matches:[
        {id:'F1', a:{type:'winner',id:'SF1'}, b:{type:'winner',id:'SF2'}, score:{a:null}}
      ]}
    ];
  } else {
    if(lb.length < 8){ alert('You need at least 8 players with recorded results to form 4 two-player teams for the Final stage.'); return; }
    seeds = buildKoTeams(lb, 4);
    rounds = [
      {name:'Final Stage', matches:[
        {id:'SF1', a:{type:'seed',n:0}, b:{type:'seed',n:3}, score:{a:null}},
        {id:'SF2', a:{type:'seed',n:1}, b:{type:'seed',n:2}, score:{a:null}}
      ]},
      {name:'Final', matches:[
        {id:'F1', a:{type:'winner',id:'SF1'}, b:{type:'winner',id:'SF2'}, score:{a:null}}
      ]}
    ];
  }
  state.knockout = {stage, seeds, rounds};
  saveState();
  render();
}

function tierLabel(roundName){
  if(roundName === 'Quarterfinal') return 'Quarterfinalists (5th\u20138th)';
  if(roundName === 'Semifinal' || roundName === 'Final Stage') return 'Semifinalists (3rd\u20134th)';
  return roundName;
}

function computeKnockoutStandings(){
  if(!state.knockout) return [];
  const rounds = state.knockout.rounds;
  const tiers = [];
  const finalMatch = rounds[rounds.length-1].matches[0];
  tiers.push({label:'Champion', teams:[resolveTeamRef({type:'winner', id:finalMatch.id})]});
  tiers.push({label:'Runner-up', teams:[resolveLoserTeam(finalMatch.id)]});
  for(let ri=rounds.length-2; ri>=0; ri--){
    const round = rounds[ri];
    tiers.push({label:tierLabel(round.name), teams: round.matches.map(m=>resolveLoserTeam(m.id))});
  }
  return tiers;
}

function teamName(team){
  if(!team) return 'TBD';
  return team.map(idx=>state.players[idx]).join(' + ');
}

function renderKnockoutStandings(container){
  if(!container) return;
  const tiers = computeKnockoutStandings();
  let html = `<div class="section-title" style="margin-bottom:10px;"><span>KNOCKOUT STANDINGS</span></div>`;
  tiers.forEach(tier=>{
    const names = tier.teams.map(teamName).join(' &nbsp;/&nbsp; ');
    html += `<div class="lb-row"><div class="lb-name" style="cursor:default;">${escapeHtml(tier.label)}</div><div class="lb-stats" style="max-width:60%; white-space:normal; text-align:right;">${names}</div></div>`;
  });
  container.innerHTML = `<div style="margin-bottom:18px;">${html}</div>`;
}

  wrap.className = 'card ko-card';

  if(!state.knockout){
    wrap.innerHTML = `
      <div class="section-title"><span>KNOCKOUT STAGE</span></div>
      <div class="hint" style="margin-top:0;">Forms 2-player teams from current individual standings (top finisher paired with the lowest qualifying finisher, and so on) and generates an elimination bracket. The round-robin leaderboard stays as-is &mdash; standings for the bracket are tracked separately below once generated.</div>
      <div class="grid2" style="margin-top:14px;">
        <div class="field">
          <label>Starting stage</label>
          <select id="koStageSelect">
            <option value="quarterfinal">Quarterfinal &mdash; 8 teams (top 16 players)</option>
            <option value="semifinal">Semifinal &mdash; 4 teams (top 8 players)</option>

          </select>

    renderKnockoutStandings(wrap.querySelector('#koStandingsHolder'));

  container.appendChild(wrap);
}

function renderKoMatchCard(m){
  const el = document.createElement('div');
  el.className = 'match';
  const target = state.pointsTarget;
  const teamA = resolveTeamRef(m.a);
  const teamB = resolveTeamRef(m.b);
  const ready = teamA !== null && teamB !== null;
  const nameA = teamName(teamA);
  const nameB = teamName(teamB);
  const aVal = m.score.a;
  const oppVal = (aVal===null || aVal==='') ? '&mdash;' : (target - (+aVal));
  let winnerSide = null;
  if(ready && aVal!==null && aVal!==''){
    const a = +aVal, b = target - a;
    if(a>b) winnerSide='a'; else if(b>a) winnerSide='b';
  }
  const tie = ready && aVal!==null && aVal!=='' && winnerSide===null;
  el.innerHTML = `
    <div class="court">${escapeHtml(m.id)}</div>
    <div class="teams">
      <div class="team ${winnerSide==='a'?'ko-winner':''}">${escapeHtml(nameA)}</div>
      <input type="number" min="0" max="${target}" class="score-input" data-koid="${m.id}" value="${aVal===null?'':aVal}" placeholder="&mdash;" ${ready?'':'disabled'} />
      <span class="vs">:</span>
      <span class="opp-score">${oppVal}</span>
      <div class="team ${winnerSide==='b'?'ko-winner':''}" style="text-align:right;">${escapeHtml(nameB)}</div>
    </div>
    ${!ready ? '<div class="hint ko-wait-hint" style="margin-top:8px; margin-bottom:0;">Waiting for previous match result&hellip;</div>' : ''}
    ${tie ? '<div class="hint ko-tie-hint" style="margin-top:8px; margin-bottom:0; color:var(--danger);">Scores are tied &mdash; adjust to declare a winner.</div>' : ''}
  `;
  const inp = el.querySelector('.score-input');
  if(inp && !inp.disabled){
    inp.addEventListener('input', e=>{
      const val = e.target.value;
      m.score.a = (val==='') ? null : Math.max(0, Math.min(target, +val));
      saveState();
      updateAfterKoScoreChange(m.id, e.target);
    });
  }
  return el;
}

function updateAfterKoScoreChange(matchId, inputEl){
  const target = state.pointsTarget;
  const m = findKoMatch(matchId);
  const val = m.score.a;
  const matchEl = inputEl.closest('.match');
  matchEl.querySelector('.opp-score').textContent = (val===null||val==='') ? '\u2014' : (target-(+val));

  const teamEls = matchEl.querySelectorAll('.team');
  teamEls.forEach(te=>te.classList.remove('ko-winner'));
  let tieNeeded = false;
  if(val!==null && val!==''){
    const a=+val, b=target-a;
    if(a>b) teamEls[0].classList.add('ko-winner');
    else if(b>a) teamEls[1].classList.add('ko-winner');
    else tieNeeded = true;
  }
  let hintEl = matchEl.querySelector('.ko-tie-hint');
  if(tieNeeded){
    if(!hintEl){
      hintEl = document.createElement('div');
      hintEl.className = 'hint ko-tie-hint';
      hintEl.style.marginTop='8px'; hintEl.style.marginBottom='0'; hintEl.style.color='var(--danger)';
      hintEl.textContent = 'Scores are tied \u2014 adjust to declare a winner.';
      matchEl.appendChild(hintEl);
    }
  } else if(hintEl){
    hintEl.remove();
  }

  refreshDownstreamKoRounds(matchId);
  refreshKoStandings();
}

function refreshKoStandings(){
  const holder = document.getElementById('koStandingsHolder');
  if(holder) renderKnockoutStandings(holder);
}

function refreshDownstreamKoRounds(matchId){
  const rounds = state.knockout.rounds;
  const roundIdx = rounds.findIndex(r=> r.matches.some(mm=>mm.id===matchId));
  const roundEls = document.querySelectorAll('.ko-round-block');
  for(let ri=roundIdx+1; ri<rounds.length; ri++){
    const roundEl = roundEls[ri];
    if(roundEl){
      const grid = roundEl.querySelector('.matches-grid');
      grid.innerHTML = '';
      rounds[ri].matches.forEach(m2=> grid.appendChild(renderKoMatchCard(m2)));
    }
  }
}

/* ---------- PLAYING ---------- */
function computeLeaderboard(){
  const n = state.players.length;
  const stats = Array.from({length:n}, ()=>({points:0, against:0, wins:0, played:0}));
  state.schedule.forEach((round,ri)=>{
    round.matches.forEach((m,mi)=>{
      const sc = state.scores[ri][mi];
      if(sc.a === null || sc.a === undefined || sc.a === '') return;
      const a = +sc.a, b = state.pointsTarget - a;
      const [a1,a2]=m.teamA, [b1,b2]=m.teamB;
      stats[a1].points+=a; stats[a2].points+=a; stats[b1].points+=b; stats[b2].points+=b;
      stats[a1].against+=b; stats[a2].against+=b; stats[b1].against+=a; stats[b2].against+=a;
      stats[a1].played++; stats[a2].played++; stats[b1].played++; stats[b2].played++;
      if(a>b){ stats[a1].wins++; stats[a2].wins++; } else if(b>a){ stats[b1].wins++; stats[b2].wins++; }
    });
  });
  return state.players.map((name,i)=>({name, idx:i, ...stats[i]})).sort((x,y)=> y.points-x.points || y.wins-x.wins);
}

function renderPlaying(){
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="hero">
      <div>
        <h1>${escapeHtml(state.tournamentName)}</h1>
        <div class="sub">${escapeHtml(state.date)} &nbsp;&middot;&nbsp; up to ${state.pointsTarget} points &nbsp;&middot;&nbsp; ${state.numCourts} court(s) &nbsp;&middot;&nbsp; ${state.players.length} players</div>
      </div>
      <div class="actions">
        <button id="exportBtn" class="small ghost">Export</button>
        <button id="importBtn" class="small ghost">Import</button>
        <input type="file" id="importFile" accept="application/json" style="display:none;" />
        ${state.stage === 'finished'
          ? '<button id="reopenBtn" class="small ghost">Reopen tournament</button>'
          : '<button id="finishBtn" class="primary small">Finish tournament</button>'}
        <button id="resetResultsBtn" class="small ghost">Reset results</button>
        <button id="newTournament" class="warn small">New tournament</button>
      </div>
    </div>
    <div class="container">
      ${state.stage === 'finished' ? '<div id="podiumHolder"></div>' : ''}
      <div class="layout">
        <div class="card leaderboard-card">
          <div class="section-title"><span>LEADERBOARD</span></div>
          <div id="leaderboard"></div>
        </div>
        <div id="roundsCol"></div>
      </div>
    </div>
  `;

  wrap.querySelector('#resetResultsBtn').addEventListener('click', ()=>{
    if(!confirm('Reset all rounds and results? Your player list and settings will be kept.')) return;
    state.stage = 'setup';
    state.schedule = null;
    state.scores = null;
    state.knockout = null;
    saveState();
    render();
  });

  wrap.querySelector('#newTournament').addEventListener('click', ()=>{
    if(confirm('Start a new tournament? Current data will be deleted.')){
      state = defaultState();
      saveState();
      render();
    }
  });

  wrap.querySelector('#exportBtn').addEventListener('click', exportState);
  const importFile = wrap.querySelector('#importFile');
  wrap.querySelector('#importBtn').addEventListener('click', ()=> importFile.click());
  importFile.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(file) importStateFromFile(file);
  });

  const finishBtn = wrap.querySelector('#finishBtn');
  if(finishBtn){
    finishBtn.addEventListener('click', ()=>{
      if(!confirm('Finish the tournament? This saves a results file to your Downloads and highlights the top 3 players.')) return;
      state.stage = 'finished';
      saveState();
      exportState();
      render();
    });
  }
  const reopenBtn = wrap.querySelector('#reopenBtn');
  if(reopenBtn){
    reopenBtn.addEventListener('click', ()=>{
      state.stage = 'playing';
      saveState();
      render();
    });
  }

  if(state.stage === 'finished'){
    renderPodium(wrap.querySelector('#podiumHolder'));
  }
  renderLeaderboard(wrap.querySelector('#leaderboard'));
  renderRounds(wrap.querySelector('#roundsCol'));

  return wrap;
}

function importStateFromFile(file){
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const parsed = JSON.parse(ev.target.result);
      if(!parsed.players || !parsed.stage){ throw new Error('bad file'); }
      if(parsed.sessionMinutes === undefined) parsed.sessionMinutes = 120;
      if(parsed.knockout === undefined) parsed.knockout = null;
      state = parsed;
      saveState();
      render();
    }catch(err){
      alert('Could not read this file \u2014 it does not look like a valid Sterling Americano export.');
    }
  };
  reader.readAsText(file);
}

function exportState(){
  const safeName = (state.tournamentName || 'americano').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
  const safeDate = (state.date || '').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
  const filename = `${safeName}_${safeDate}.json`;
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderLeaderboard(container){
  const lb = computeLeaderboard();
  const hasData = lb.some(p=>p.played>0);

  const listHtml = !hasData
    ? '<div class="empty">Enter round 1 scores to see the leaderboard</div>'
    : lb.map((p,i)=>{
        const cls = i===0?'top1':i===1?'top2':i===2?'top3':'';
        const diff = p.points - p.against;
        const diffStr = diff>0 ? ('+'+diff) : String(diff);
        const diffClass = diff>0 ? 'diff-pos' : (diff<0 ? 'diff-neg' : '');
        return `
        <div class="lb-row ${cls}">
          <div class="lb-rank">${i+1}</div>
          <div class="lb-name-col">
            <div class="lb-name" data-idx="${p.idx}" title="Click to rename">${escapeHtml(p.name)}</div>
            <div class="lb-sub">${p.wins}W &middot; ${p.played} played</div>
          </div>
          <div class="lb-points-col">
            <div class="lb-points">${p.points}</div>
            <div class="lb-sub">W ${p.points} &middot; L ${p.against} &middot; <span class="${diffClass}">${diffStr}</span></div>
          </div>
        </div>`;
      }).join('');

  container.innerHTML = `
    <div id="lbList">${listHtml}</div>
    <div class="lb-add-row">
      <button id="lbAddPlayerBtn" class="small ghost">+ Add player</button>
    </div>
  `;

  container.querySelectorAll('.lb-name').forEach(nameEl=>{
    nameEl.addEventListener('click', ()=>{
      const idx = +nameEl.dataset.idx;
      const current = state.players[idx];

      const wrapEl = document.createElement('span');
      wrapEl.style.display = 'flex';
      wrapEl.style.gap = '6px';
      wrapEl.style.flex = '1';
      wrapEl.style.alignItems = 'center';

      const input = document.createElement('input');
      input.type = 'text'; input.value = current; input.className = 'lb-name-input';
      input.style.flex = '1';

      const saveBtn = document.createElement('button');
      saveBtn.textContent = '\u2713';
      saveBtn.className = 'small';
      saveBtn.style.padding = '6px 10px';

      wrapEl.appendChild(input);
      wrapEl.appendChild(saveBtn);
      nameEl.replaceWith(wrapEl);
      input.focus(); input.select();

      let committed = false;
      const commit = ()=>{
        if(committed) return;
        committed = true;
        const val = input.value.trim();
        if(val) state.players[idx] = val;
        saveState();
        render();
      };
      saveBtn.addEventListener('click', commit);
      input.addEventListener('blur', ()=> setTimeout(commit, 150));
      input.addEventListener('keydown', e=>{
        if(e.key === 'Enter') commit();
        if(e.key === 'Escape'){ committed = true; render(); }
      });
    });
  });

  const addBtn = container.querySelector('#lbAddPlayerBtn');
  if(addBtn){
    addBtn.addEventListener('click', ()=>{
      const name = prompt('New player name:');
      if(name && name.trim()){
        state.players.push(name.trim());
        saveState();
        render();
      }
    });
  }
}

function renderPodium(container){
  if(!container) return;
  const lb = computeLeaderboard();
  const top3 = lb.slice(0,3);
  if(top3.length < 3){
    container.innerHTML = '<div class="empty">Not enough completed matches to determine a podium.</div>';
    return;
  }
  const [first, second, third] = top3;
  container.innerHTML = `
    <div class="podium-wrap">
      <div class="podium-title">&#127942; Final Podium</div>
      <div class="podium">
        <div class="podium-card podium-silver">
          <span class="medal">&#129352;</span>
          <div class="rank-label">2nd place</div>
          <div class="name">${escapeHtml(second.name)}</div>
          <div class="pts">${second.points}</div>
          <div class="meta">${second.wins}W &middot; ${second.played} played</div>
        </div>
        <div class="podium-card podium-gold">
          <span class="medal">&#129351;</span>
          <div class="rank-label">1st place</div>
          <div class="name">${escapeHtml(first.name)}</div>
          <div class="pts">${first.points}</div>
          <div class="meta">${first.wins}W &middot; ${first.played} played</div>
        </div>
        <div class="podium-card podium-bronze">
          <span class="medal">&#129353;</span>
          <div class="rank-label">3rd place</div>
          <div class="name">${escapeHtml(third.name)}</div>
          <div class="pts">${third.points}</div>
          <div class="meta">${third.wins}W &middot; ${third.played} played</div>
        </div>
      </div>
    </div>
  `;
}

function renderRounds(container){
  container.innerHTML = '';
  state.schedule.forEach((round,ri)=>{
    container.appendChild(renderRoundBlock(round, ri));
  });
  const addRow = document.createElement('div');
  addRow.className = 'add-round-row';
  addRow.innerHTML = `<button id="addRoundBtn" class="primary small">+ Add round</button>`;
  container.appendChild(addRow);
  addRow.querySelector('#addRoundBtn').addEventListener('click', ()=>{
    const n = state.players.length;
    const {benchCount, partnerCount, opponentCount} = replayCounts(n, state.numCourts, state.schedule);
    const newRound = generateSingleRound(n, state.numCourts, benchCount, partnerCount, opponentCount);
    state.schedule.push(newRound);
    state.scores.push(newRound.matches.map(()=>({a:null})));
    state.numRounds = state.schedule.length;
    saveState();
    render();
  });

  renderKnockoutSection(container);
}

function renderRoundBlock(round, ri){
  const block = document.createElement('div');
  block.className = 'round-block';
  block.dataset.ri = ri;
  const allPlayed = round.matches.every((m,mi)=> state.scores[ri][mi].a !== null && state.scores[ri][mi].a !== '');
  block.innerHTML = `
    <div class="round-title">
      <div class="left"><span>Round ${ri+1}</span>${allPlayed ? '<span class="played-badge">complete</span>' : ''}</div>
      <button class="del-round" data-ri="${ri}">Delete round</button>
    </div>
  `;
  const grid = document.createElement('div');
  grid.className = 'matches-grid';
  round.matches.forEach((m,mi)=>{
    const [a1,a2]=m.teamA, [b1,b2]=m.teamB;
    const sc = state.scores[ri][mi];
    const el = document.createElement('div');
    el.className = 'match';
    const oppVal = (sc.a===null||sc.a==='') ? '\u2014' : (state.pointsTarget - (+sc.a));
    el.innerHTML = `
      <div class="court">COURT ${m.court}</div>
      <div class="teams">
        <div class="team">${escapeHtml(state.players[a1])} + ${escapeHtml(state.players[a2])}</div>
        <input type="number" min="0" max="${state.pointsTarget}" class="score-input" data-ri="${ri}" data-mi="${mi}" value="${sc.a===null?'':sc.a}" placeholder="\u2014" />
        <span class="vs">:</span>
        <span class="opp-score">${oppVal}</span>
        <div class="team" style="text-align:right;">${escapeHtml(state.players[b1])} + ${escapeHtml(state.players[b2])}</div>
      </div>
    `;
    grid.appendChild(el);
  });
  block.appendChild(grid);
  if(round.bench.length){
    const b = document.createElement('div');
    b.className = 'bench';
    b.textContent = 'Resting: ' + round.bench.map(i=>state.players[i]).join(', ');
    block.appendChild(b);
  }

  block.querySelector('.del-round').addEventListener('click', ()=>{
    if(!confirm(`Delete Round ${ri+1}? This cannot be undone.`)) return;
    state.schedule.splice(ri,1);
    state.scores.splice(ri,1);
    state.numRounds = state.schedule.length;
    saveState();
    render();
  });

  block.querySelectorAll('.score-input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const _ri = +e.target.dataset.ri, mi = +e.target.dataset.mi;
      const val = e.target.value;
      state.scores[_ri][mi].a = (val==='') ? null : Math.max(0, Math.min(state.pointsTarget, +val));
      saveState();
      updateAfterScoreChange(_ri, mi, e.target);
    });
  });

  return block;
}

function updateAfterScoreChange(ri, mi, inputEl){
  const sc = state.scores[ri][mi];
  const matchEl = inputEl.closest('.match');
  const oppSpan = matchEl.querySelector('.opp-score');
  oppSpan.textContent = (sc.a===null || sc.a==='') ? '\u2014' : (state.pointsTarget - (+sc.a));

  const roundBlock = inputEl.closest('.round-block');
  const rIdx = +roundBlock.dataset.ri;
  const round = state.schedule[rIdx];
  const allPlayed = round.matches.every((m,i)=> state.scores[rIdx][i].a !== null && state.scores[rIdx][i].a !== '');
  const leftDiv = roundBlock.querySelector('.round-title .left');
  leftDiv.innerHTML = `<span>Round ${rIdx+1}</span>${allPlayed ? '<span class="played-badge">complete</span>' : ''}`;

  const lbContainer = document.getElementById('leaderboard');
  if(lbContainer) renderLeaderboard(lbContainer);

  const podiumHolder = document.getElementById('podiumHolder');
  if(podiumHolder) renderPodium(podiumHolder);
}

// Watermark logos are applied as a pure CSS background-image on <body>
// (see the body{} rule) rather than a DOM overlay — backgrounds always
// paint behind an element's own content per the CSS spec, so there is
// no z-index or stacking-context risk of it covering the UI.
render();
</script>
</body>
</html>
